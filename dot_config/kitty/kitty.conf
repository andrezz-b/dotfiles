# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

enable_audio_bell no

initial_window_width  90c
initial_window_height 25c

# BEGIN_KITTY_FONTS
font_size        14.0
font_family      family='JetBrains Mono' postscript_name=JetBrainsMono-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
